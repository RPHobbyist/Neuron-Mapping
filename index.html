<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <title>Nexus Mind Mapper - Visual Mind Mapping Tool</title>
  <meta name="description"
    content="Create beautiful mind maps with Nexus Mind Mapper. Organize ideas, brainstorm visually, and boost productivity with our intuitive mind mapping tool." />
  <meta name="author" content="RP Hobbyist" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nexus Mind Mapper" />
  <meta property="og:description" content="Visual Mind Mapping Tool" />

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: *; connect-src 'self' *;" />

  <!-- Preconnect to external domains for faster resource fetching -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload critical font (reduces LCP) -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    id="google-fonts-link" />
  <script>
    // Safer way to load fonts without inline event handlers
    const fontLink = document.getElementById('google-fonts-link');
    if (fontLink) {
      fontLink.media = 'all';
    }
  </script>

  <!-- Critical CSS for loading state (inline for fastest paint) -->
  <style>
    /* Prevent FOUC and show loading state immediately */
    :root {
      --bg-color: #f8fafc;
      --primary-color: #6366f1;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg-color);
    }

    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-color);
    }

    #root:empty::after {
      content: '';
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
