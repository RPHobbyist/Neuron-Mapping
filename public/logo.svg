<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="128" fill="url(#grad1)" />
  
  <g transform="translate(106, 106) scale(0.6)" filter="url(#glow)">
    <!-- Central Node -->
    <circle cx="250" cy="250" r="60" fill="white" />
    
    <!-- Connections -->
    <path d="M250 190 L250 100" stroke="white" stroke-width="24" stroke-linecap="round" />
    <path d="M250 310 L250 400" stroke="white" stroke-width="24" stroke-linecap="round" />
    <path d="M196 220 L110 170" stroke="white" stroke-width="24" stroke-linecap="round" />
    <path d="M304 220 L390 170" stroke="white" stroke-width="24" stroke-linecap="round" />
    <path d="M196 280 L110 330" stroke="white" stroke-width="24" stroke-linecap="round" />
    <path d="M304 280 L390 330" stroke="white" stroke-width="24" stroke-linecap="round" />
    
    <!-- Satellite Nodes -->
    <circle cx="250" cy="80" r="35" fill="white" fill-opacity="0.8" />
    <circle cx="250" cy="420" r="35" fill="white" fill-opacity="0.8" />
    <circle cx="90" cy="160" r="35" fill="white" fill-opacity="0.8" />
    <circle cx="410" cy="160" r="35" fill="white" fill-opacity="0.8" />
    <circle cx="90" cy="340" r="35" fill="white" fill-opacity="0.8" />
    <circle cx="410" cy="340" r="35" fill="white" fill-opacity="0.8" />
  </g>
</svg>
